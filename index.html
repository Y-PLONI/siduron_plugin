<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>סידורון</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-date">
        <span class="hdr-date" id="hdr-date"></span>
        <span class="hdr-season" id="hdr-season"></span>
        <div class="header-tools">
          <button class="tool-btn" id="btn-nav" aria-label="קפיצה לקטע" title="קפיצה לקטע">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="14" y2="18"/></svg>
          </button>
          <button class="tool-btn" id="btn-zmanim" aria-label="זמני היום" title="זמני היום">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
          </button>
          <button class="tool-btn" id="btn-settings" aria-label="הגדרות" title="הגדרות">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
        </div>
      </div>
      <div class="hdr-badges" id="hdr-badges"></div>
      <nav class="tabs" id="tabs"></nav>
    </header>

    <div class="reader-scroll" id="reader-scroll">
      <h2 class="service-title" id="hdr-title"></h2>
      <section class="content" id="content">
        <div class="muted center">טוען…</div>
      </section>
    </div>

    <div class="fontbar">
      <button class="fs-btn" id="fs-dec" aria-label="הקטנת גופן">א−</button>
      <span class="fs-val" id="fs-val">22</span>
      <button class="fs-btn" id="fs-inc" aria-label="הגדלת גופן">א+</button>
    </div>
  </div>

  <div class="backdrop" id="backdrop"></div>

  <!-- Jump-to-section -->
  <aside class="panel panel-end" id="panel-nav" aria-label="קפיצה לקטע">
    <div class="panel-head"><span>קפיצה לקטע</span><button class="tool-btn" data-close aria-label="סגירה"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button></div>
    <div class="panel-body" id="nav-body"></div>
  </aside>

  <!-- Zmanim -->
  <aside class="panel panel-end" id="panel-zmanim" aria-label="זמני היום">
    <div class="panel-head"><span>זמני היום</span><button class="tool-btn" data-close aria-label="סגירה"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button></div>
    <div class="panel-body" id="zmanim-body"></div>
  </aside>

  <!-- Settings -->
  <aside class="panel panel-end" id="panel-settings" aria-label="הגדרות">
    <div class="panel-head"><span>הגדרות</span><button class="tool-btn" data-close aria-label="סגירה"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button></div>
    <div class="panel-body">
      <div class="set-row"><div class="set-label">נוסח</div><div class="pill-row" id="set-nusach"></div></div>
      <div class="set-row"><div class="set-label">מתפלל/ת</div><div class="pill-row" id="set-gender"></div></div>
      <div class="set-row toggle-row"><div class="set-label">אני בארץ ישראל</div><button class="switch" id="set-israel" aria-label="ארץ ישראל"></button></div>
      <div class="set-row toggle-row"><div class="set-label">מתפלל/ת במניין</div><button class="switch" id="set-minyan" aria-label="מניין"></button></div>
      <div class="set-row"><div class="set-label">פורים (ערים מוקפות)</div><div class="pill-row" id="set-purim"></div></div>
      <div class="set-row toggle-row"><div class="set-label">הצגת שם ה׳ כ״ה׳״</div><button class="switch" id="set-censor" aria-label="צנזור שם"></button></div>
      <div class="set-note">התוספות מזוהות אוטומטית לפי התאריך, הזמנים והפרופיל. סידור חול (שחרית/מנחה/מעריב).</div>
    </div>
  </aside>

  <script src="vendor/hebcal.js"></script>
  <script src="data/siddur-data.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/assembler.js"></script>
  <script src="js/render.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
